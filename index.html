<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Online Course Marketplace - learn technology, design, cloud, and career skills from expert instructors.">
  <title>Online Course Marketplace</title>
  <link rel="preload" href="style.css" as="style">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast" class="toast-stack" aria-live="polite"></div>
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader-card">
      <span class="skeleton skeleton-title"></span>
      <span class="skeleton"></span>
      <span class="skeleton short"></span>
    </div>
  </div>

  <header class="site-header glass">
    <a class="brand" href="#home" aria-label="Online Course Marketplace Home">
      <img src="assets/logo.svg" alt="" width="38" height="38">
      <span>CourseMarket</span>
    </a>
    <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Open menu">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <nav class="main-nav" id="mainNav" aria-label="Primary navigation">
      <a href="#home">Home</a>
      <a href="#courses">Courses</a>
      <a href="#categories">Categories</a>
      <a href="#instructors">Instructors</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/><circle cx="12" cy="12" r="4"/></svg>
      </button>
      <button class="icon-btn cart-btn" id="cartBtn" aria-label="Open cart">
        <svg viewBox="0 0 24 24"><path d="M6 6h15l-2 8H8L6 3H3"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
        <span id="cartCount">0</span>
      </button>
      <button class="btn ghost auth-only signed-out" data-route="login">Login</button>
      <button class="btn primary auth-only signed-out" data-route="signup">Signup</button>
      <button class="btn ghost auth-only signed-in" data-route="dashboard">Dashboard</button>
      <button class="btn danger auth-only signed-in" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main id="app" tabindex="-1"></main>

  <button class="back-top icon-btn" id="backTop" aria-label="Back to top">
    <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <div class="modal-shell" id="modal" aria-hidden="true"></div>
  <script src="script.js" defer></script>
</body>
</html>
